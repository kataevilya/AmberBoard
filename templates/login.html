{% extends "base.html" %}

{% block title %}Вход - AmberBoard{% endblock %}

{% block content %}
<style>
    .auth-form-container {
        max-width: 400px;
        margin: 0 auto;
        padding: 20px;
    }
    .form-group { margin-bottom: 15px; }
    .form-group input {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        border: 1px solid var(--border-color);
        border-radius: 4px;
    }
    .submit-btn {
        width: 100%;
        padding: 10px;
        background-color: var(--primary-orange);
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }
    .submit-btn:hover { background-color: var(--dark-orange); }
</style>

<div class="content-box auth-form-container">
    <h2 class="box-title" style="text-align: center;">Вход в аккаунт</h2>
    <form action="/login" method="POST" style="padding: 20px;">
        <div class="form-group">
            <input type="text" name="username" placeholder="Логин" required>
        </div>
        <div class="form-group">
            <input type="password" name="password" placeholder="Пароль" required>
        </div>
        <button type="submit" class="submit-btn">Войти</button>
    </form>
</div>
{% endblock %}
