{% extends "base.html" %}
{% block content %}
<center>
    <div class="post-form">
        <h3>Настройки профиля</h3>
        <form method="POST">
            <table>
                <tr><td>Имя:</td><td><input type="text" name="username" value="{{ current_user.username }}" required></td></tr>
                <tr><td>О себе:</td><td><textarea name="bio" rows="3" cols="30">{{ current_user.bio }}</textarea></td></tr>
                <tr><td></td><td><input type="submit" value="Сохранить изменения"></td></tr>
            </table>
        </form>
    </div>
</center>
{% endblock %}
