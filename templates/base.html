<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}AmberBoard{% endblock %}</title>
    <style>
        /* Строгая оранжевая 4chan-палитра */
        body {
            background-color: #FFF3E0;
            color: #333333;
            font-family: arial, helvetica, sans-serif;
            font-size: 10pt;
            margin: 0;
            padding: 8px;
        }
        a { color: #D84315; text-decoration: none; }
        a:hover { color: #FF3D00; }

        #boardNavDesktop {
            font-size: 9pt;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .boardBanner { text-align: center; clear: both; }
        .boardTitle {
            color: #BF360C; font-size: 28px; font-weight: bold;
            letter-spacing: 2px; margin-top: 10px;
        }

        table.postForm { margin: 0 auto; border-spacing: 1px; font-size: 10pt; }
        table.postForm td { padding: 0; }
        .postblock {
            background-color: #FFB74D; color: #5D4037; font-weight: bold;
            border: 1px solid #F57C00; padding: 2px 5px; text-align: left;
        }
        table.postForm input[type="text"], table.postForm textarea {
            border: 1px solid #BCAAA4; margin: 0; padding: 2px;
        }
        table.postForm textarea { width: 300px; height: 120px; }
        hr { border: none; border-top: 1px solid #FFCC80; margin: 15px 0; }

        .board { margin: 0; padding: 0; }
        .thread { margin-bottom: 20px; }
        .postContainer { margin-top: 4px; }
        .reply {
            background-color: #FFE0B2; border-right: 1px solid #FFCC80;
            border-bottom: 1px solid #FFCC80; display: table; padding: 2px 4px 6px 4px;
        }
        .postInfo { display: block; margin-bottom: 5px; }
        .subject { color: #D84315; font-weight: bold; }
        .name { color: #2E7D32; font-weight: bold; }
        .dateTime { margin: 0 5px; }
        .postNum a { color: #5D4037; text-decoration: none; }
        .postNum a:hover { color: #D84315; }
        
        .file { display: block; }
        .fileText { font-size: 8pt; }
        .fileThumb { float: left; margin: 2px 20px 10px 5px; border: none; }
        .fileThumb div {
            width: 250px; height: 140px; background-color: #FFCC80;
            text-align: center; line-height: 140px; color: #D84315; border: 1px solid #F57C00;
        }
        
        .postMessage { margin: 1em 1em 1em 3em; word-wrap: break-word; }
        .quote { color: #789922; }
        .quotelink { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="boardNavDesktop">
        <span class="boardList">
            [<a href="/">home</a>]
            [<a href="/b/">b</a>]
            [<a href="/dev/">dev</a>]
            [<a href="/h/">h</a>]
        </span>
        <span class="customBoardList">
            [<a href="/login">login</a>]
            [<a href="/register">register</a>]
        </span>
    </div>

    {% block content %}{% endblock %}
</body>
</html>
